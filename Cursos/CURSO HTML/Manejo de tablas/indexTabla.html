<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <link href="styleTabla.css" rel="stylesheet" type="text/css" />
    <title>Tabla</title>
</head>

<body>
    <table>
        <tr>
            <th>
                Pais
            </th>
            <th>
                Capital
            </th>
            <th>
                Idioma
            </th>
        </tr>
        <tr>
            <td>
                <p>Colombia</p>
            </td>
            <td>
                <p>Bogotá</p>
            </td>
            <td>
                <p>Español</p>
            </td>
        </tr>
        <tr>
            <td><p>Francia</p></td>
            <td><p>Paris</p></td>
            <td><p>Francés</p></td>
        </tr>
        <tr>
            <td><p>Brasil</p></td>
            <td><p>Brasilia</p></td>
            <td><p>Portugues</p></td>
        </tr>
    </table>
    <br>
    <form>
        <label for="Nombre">Nombres</label>
        <input type="text" class="Nombre" id="Nombre">
        <label for="Apellido">Apellidos</label>
        <input type="text" class="Apellido" id="Apellido">
        <div>
            <label for="Masculino">Masculino</label>
            <input type="radio" id="Masculino" class="Masculino">
        </div>
        <div>
            <label for="Femenino">Femenino</label>
            <input type="radio" id="Femenino" class="Femenino">
        </div>
        <div>
            <input type="reset" name="Borrar" id="Borrar">
            <input type="submit" name="Guardar" id="Guardar">
        </div>
    </form>
    <script src="scriptTabla.js"></script>
    <canvas>alo</canvas>
</body>

</html>
